<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农产品溯源查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .search-box input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .search-box button {
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
        }
        
        .result {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .product-header {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        
        .product-image {
            width: 100px;
            height: 100px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
        }
        
        .product-info h2 {
            color: #333;
            margin-bottom: 8px;
        }
        
        .product-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .tag {
            display: inline-block;
            background: #e8f4ff;
            color: #0070f3;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: "";
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .farm-card {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 12px;
        }
        
        .farm-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .story {
            background: #fff9e6;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #ffc107;
        }
        
        .story p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        
        .timeline::before {
            content: "";
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 20px;
        }
        
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -18px;
            top: 4px;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .timeline-item h4 {
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .timeline-item p {
            color: #999;
            font-size: 12px;
        }
        
        .quality-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #e8f5e9;
            color: #4caf50;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .quality-badge.warning {
            background: #fff3e0;
            color: #ff9800;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        
        .demo-btn {
            display: inline-block;
            margin-top: 12px;
            color: #667eea;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 农产品溯源查询</h1>
            <p>扫描二维码，追溯农产品全程信息</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="productCode" placeholder="请输入产品编码或扫码">
            <button onclick="searchProduct()">查询溯源信息</button>
            <span class="demo-btn" onclick="loadDemo()">查看演示数据</span>
        </div>
        
        <div id="result" class="result">
            <!-- 结果将在这里显示 -->
        </div>
    </div>
    
    <script>
        // API 基础地址（部署后需要修改为实际地址）
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://YOUR-API-URL.up.railway.app';
        
        async function searchProduct() {
            const code = document.getElementById('productCode').value.trim();
            if (!code) {
                alert('请输入产品编码');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">正在查询...</div>';
            resultDiv.classList.add('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/product/${code}`);
                if (!response.ok) {
                    throw new Error('产品不存在');
                }
                const data = await response.json();
                renderResult(data);
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }
        
        function renderResult(data) {
            const resultDiv = document.getElementById('result');
            
            // 产品图标映射
            const iconMap = {
                '蔬菜': '🥬',
                '水果': '🍎',
                '畜禽': '🐔',
                '粮食': '🌾',
                'default': '📦'
            };
            const icon = iconMap[data.category] || iconMap['default'];
            
            // 渲染 HTML
            let html = `
                <div class="product-header">
                    <div class="product-image">${icon}</div>
                    <div class="product-info">
                        <h2>${data.name}</h2>
                        <p>编码：${data.code}</p>
                        <p>品牌：${data.brand || '暂无'}</p>
                        <p>产地：${data.origin || '暂无'}</p>
                        <span class="tag">${data.category || '农产品'}</span>
                    </div>
                </div>
            `;
            
            // 农场信息
            if (data.farm_info && data.farm_info.farm_name) {
                html += `
                    <div class="section">
                        <div class="section-title">农场信息</div>
                        <div class="farm-card">
                            <p><strong>农场名称：</strong>${data.farm_info.farm_name}</p>
                            <p><strong>地理位置：</strong>${data.farm_info.location || '暂无'}</p>
                            <p><strong>认证信息：</strong>${data.farm_info.certification || '暂无'}</p>
                        </div>
                    </div>
                `;
                
                if (data.farm_info.story) {
                    html += `
                        <div class="section">
                            <div class="section-title">品牌故事</div>
                            <div class="story">
                                <p>${data.farm_info.story}</p>
                            </div>
                        </div>
                    `;
                }
            }
            
            // 生产记录
            if (data.production_records && data.production_records.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">生产历程</div>
                        <div class="timeline">
                `;
                
                data.production_records.forEach(record => {
                    const date = new Date(record.date).toLocaleDateString('zh-CN');
                    html += `
                        <div class="timeline-item">
                            <h4>${record.stage}</h4>
                            <p>${date} · ${record.operator || '未知操作员'} · ${record.description || ''}</p>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            // 质检记录
            if (data.quality_records && data.quality_records.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">质检报告</div>
                `;
                
                data.quality_records.forEach(record => {
                    const date = new Date(record.check_date).toLocaleDateString('zh-CN');
                    const isPass = record.result === '合格';
                    html += `
                        <div style="background:#f9f9f9;padding:16px;border-radius:12px;margin-bottom:12px;">
                            <span class="quality-badge ${isPass ? '' : 'warning'}">${record.result || '未知'}</span>
                            <p style="margin-top:8px;color:#666;font-size:14px;">
                                质检员：${record.inspector || '未知'} | 日期：${date}
                            </p>
                            ${record.notes ? `<p style="color:#999;font-size:12px;margin-top:4px;">备注：${record.notes}</p>` : ''}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // 产品描述
            if (data.description) {
                html += `
                    <div class="section">
                        <div class="section-title">产品描述</div>
                        <p style="color:#666;line-height:1.6;">${data.description}</p>
                    </div>
                `;
            }
            
            resultDiv.innerHTML = html;
        }
        
        function loadDemo() {
            document.getElementById('productCode').value = 'DEMO001';
            searchProduct();
        }
    </script>
</body>
</html>
