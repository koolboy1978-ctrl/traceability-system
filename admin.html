<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农产品溯源 - 管理后台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-card h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        /* 文件上传 */
        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .file-upload input { display: none; }
        .uploaded-files {
            margin-top: 10px;
        }
        .uploaded-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #e8f4ff;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .uploaded-file a {
            color: #667eea;
            text-decoration: none;
        }
        .uploaded-file button {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
        }
        
        /* 动态添加的记录 */
        .record-item {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            position: relative;
        }
        .record-item .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff5252;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* 批量生成 */
        .batch-config {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .batch-preview {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .batch-preview code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-bar.show { display: block; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        /* 产品列表 */
        .product-list {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }
        .product-item:last-child { border-bottom: none; }
        .product-info h4 { color: #333; margin-bottom: 4px; }
        .product-info p { color: #999; font-size: 14px; }
        .product-actions button {
            margin-left: 8px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-view { background: #e3f2fd; color: #1976d2; }
        .btn-qr { background: #f3e5f5; color: #7b1fa2; }
        .btn-del { background: #ffebee; color: #c62828; }
        .btn-del:hover { background: #ffcdd2; }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            display: none;
        }
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        
        /* 二维码预览 */
        .qr-preview {
            text-align: center;
            padding: 20px;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .batch-config { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌾 农产品溯源管理系统</h1>
        <p>录入产品信息 · 批量生成二维码 · 上传质检报告</p>
    </div>
    
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('add')">➕ 录入产品</button>
            <button class="tab" onclick="switchTab('list')">📋 产品列表</button>
            <button class="tab" onclick="switchTab('batch')">📦 批量生成</button>
            <button class="tab" onclick="switchTab('single')">📱 单个二维码</button>
        </div>
        
        <!-- 录入产品 -->
        <div id="panel-add" class="panel active">
            <form id="productForm">
                <!-- 录入模式切换 -->
                <div style="display:flex;gap:12px;margin-bottom:20px;">
                    <button type="button" id="modeSingle" onclick="setInputMode('single')" 
                        style="flex:1;padding:14px;border:2px solid #667eea;background:#667eea;color:white;border-radius:10px;font-size:16px;cursor:pointer;">
                        📦 单个产品录入
                    </button>
                    <button type="button" id="modeBatch" onclick="setInputMode('batch')"
                        style="flex:1;padding:14px;border:2px solid #ddd;background:white;color:#333;border-radius:10px;font-size:16px;cursor:pointer;">
                        📋 号段批量录入
                    </button>
                </div>
                
                <!-- 号段录入区域（默认隐藏） -->
                <div id="batchInputArea" style="display:none;">
                    <div class="form-card" style="background:#f0f4ff;border:2px solid #667eea;">
                        <h3>📋 号段设置</h3>
                        <p style="color:#666;margin-bottom:16px;font-size:14px;">
                            一次录入一整批商品，共享相同的溯源资料。<br>
                            例如：前缀 <strong>WYF</strong>，编号 <strong>1 ~ 9999</strong> → 创建 WYF000001 到 WYF009999 共9999个编码
                        </p>
                        <div class="form-row">
                            <div class="form-group">
                                <label>编码前缀 *</label>
                                <input type="text" id="batch_prefix" placeholder="如：WYF" maxlength="20">
                            </div>
                            <div class="form-group">
                                <label>起始编号 *</label>
                                <input type="number" id="batch_start" value="1" min="1" max="999999">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>结束编号 *</label>
                                <input type="number" id="batch_end" value="1000" min="1" max="999999">
                            </div>
                            <div class="form-group">
                                <label>预计生成数量</label>
                                <input type="text" id="batch_total" readonly 
                                    style="background:#e8e8e8;color:#667eea;font-weight:bold;text-align:center;" value="1000">
                            </div>
                        </div>
                        <!-- 已用号段提示 -->
                        <div id="usedRangesArea" style="margin-top:12px;display:none;">
                            <div style="font-size:13px;color:#c62828;background:#ffebee;padding:10px;border-radius:8px;">
                                ⚠️ <strong>已占用号段（不可重复使用）：</strong>
                                <div id="usedRangesText" style="margin-top:6px;"></div>
                            </div>
                        </div>
                        <div id="conflictWarning" style="margin-top:8px;display:none;">
                            <div style="font-size:13px;color:#e65100;background:#fff3e0;padding:10px;border-radius:8px;border-left:4px solid #ff9800;">
                                🔁 <span id="conflictText"></span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 基本信息 -->
                <div class="form-card">
                    <h3>📦 基本信息</h3>
                    <div class="form-row" id="singleCodeRow">
                        <div class="form-group">
                            <label>产品编码 *</label>
                            <input type="text" id="code" placeholder="如：APPLE001" required>
                        </div>
                        <div class="form-group">
                            <label>产品名称 *</label>
                            <input type="text" id="name" placeholder="如：烟台红富士苹果" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>产品类别</label>
                            <select id="category">
                                <option value="水果">水果</option>
                                <option value="蔬菜">蔬菜</option>
                                <option value="粮食">粮食</option>
                                <option value="畜禽">畜禽</option>
                                <option value="水产">水产</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>品牌名称</label>
                            <input type="text" id="brand" placeholder="如：阳光果园">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>产地</label>
                            <input type="text" id="origin" placeholder="如：山东省烟台市">
                        </div>
                        <div class="form-group">
                            <label>产品图片URL</label>
                            <input type="text" id="image_url" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>产品描述</label>
                        <textarea id="description" placeholder="描述产品特点、口感、种植方式等..."></textarea>
                    </div>
                </div>
                
                <!-- 农场信息 -->
                <div class="form-card">
                    <h3>🚜 农场信息</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>农场名称</label>
                            <input type="text" id="farm_name" placeholder="如：阳光有机果园">
                        </div>
                        <div class="form-group">
                            <label>农场位置</label>
                            <input type="text" id="farm_location" placeholder="如：山东省烟台市栖霞镇">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>种植面积（亩）</label>
                            <input type="number" id="farm_area" placeholder="50">
                        </div>
                        <div class="form-group">
                            <label>认证信息</label>
                            <input type="text" id="farm_certification" placeholder="如：有机食品认证">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>品牌故事</label>
                        <textarea id="farm_story" placeholder="讲述农场历史、种植理念..."></textarea>
                    </div>
                </div>
                
                <!-- 生产记录 -->
                <div class="form-card">
                    <h3>📝 生产记录</h3>
                    <div id="productionRecords"></div>
                    <button type="button" class="btn-secondary" onclick="addProductionRecord()">+ 添加生产记录</button>
                </div>
                
                <!-- 质检记录 -->
                <div class="form-card">
                    <h3>✅ 质检记录</h3>
                    <div id="qualityRecords"></div>
                    <button type="button" class="btn-secondary" onclick="addQualityRecord()">+ 添加质检记录</button>
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button type="submit" class="btn-primary">💾 保存产品信息</button>
                    <button type="button" class="btn-secondary" onclick="resetForm()">重置</button>
                </div>
            </form>
        </div>
        
        <!-- 产品列表 -->
        <div id="panel-list" class="panel">
            <div class="product-list">
                <h3 style="margin-bottom: 20px;">📋 所有产品</h3>
                <div id="productListContent">
                    <p style="color: #999; text-align: center;">加载中...</p>
                </div>
            </div>
        </div>
        
        <!-- 批量生成 -->
        <div id="panel-batch" class="panel">
            <div class="form-card">
                <h3>📦 批量生成二维码</h3>
                <p style="color: #666; margin-bottom: 20px;">适用于为每个单品生成独立二维码，支持一次性生成10000+个</p>
                
                <div class="batch-config">
                    <div class="form-group">
                        <label>编码前缀</label>
                        <input type="text" id="batchPrefix" placeholder="如：APPLE" value="">
                    </div>
                    <div class="form-group">
                        <label>起始编号</label>
                        <input type="number" id="batchStart" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>生成数量</label>
                        <input type="number" id="batchCount" value="100" min="1" max="10000">
                    </div>
                    <div class="form-group">
                        <label>二维码尺寸</label>
                        <select id="batchSize">
                            <option value="200">小 (200px)</option>
                            <option value="300" selected>中 (300px)</option>
                            <option value="400">大 (400px)</option>
                            <option value="500">超大 (500px)</option>
                        </select>
                    </div>
                </div>
                
                <div class="batch-preview">
                    <strong>编码预览：</strong>
                    <span id="codePreview"><code>000001</code> ~ <code>000100</code></span>
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>
                        <input type="checkbox" id="batchLabel" checked> 在二维码下方显示编码文字
                    </label>
                </div>
                
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-primary" onclick="generateBatchQR('zip')">
                        📦 生成ZIP包（单独文件）
                    </button>
                    <button class="btn-primary" onclick="generateBatchQR('pdf')" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        📄 生成PDF打印版
                    </button>
                </div>
                
                <div id="batchResult" style="margin-top: 20px;"></div>
            </div>
        </div>
        
        <!-- 单个二维码 -->
        <div id="panel-single" class="panel">
            <div class="form-card">
                <h3>📱 生成单个二维码</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>选择产品</label>
                        <select id="qrProductSelect" onchange="updateSingleQR()">
                            <option value="">-- 请选择产品 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>或手动输入编码</label>
                        <input type="text" id="qrCodeInput" placeholder="如：DEMO001" oninput="updateSingleQR()">
                    </div>
                    <div class="form-group">
                        <label>二维码尺寸</label>
                        <select id="qrSize" onchange="updateSingleQR()">
                            <option value="150">小 (150px)</option>
                            <option value="200" selected>中 (200px)</option>
                            <option value="300">大 (300px)</option>
                            <option value="400">超大 (400px)</option>
                        </select>
                    </div>
                </div>
                
                <div class="qr-preview">
                    <div id="qrcode"></div>
                    <p style="color: #667eea; word-break: break-all; margin-top: 10px;" id="qrUrl"></p>
                    <button class="btn-primary" onclick="downloadSingleQR()" style="margin-top: 20px;">
                        ⬇️ 下载二维码
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_BASE = 'https://traceability-system-production-2209.up.railway.app';
        let products = [];
        let currentQR = null;
        
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
            
            if (tab === 'list') loadProducts();
            if (tab === 'single') loadProductsForQR();
            if (tab === 'batch') updateBatchPreview();
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // 更新批量预览
        function updateBatchPreview() {
            const prefix = document.getElementById('batchPrefix').value;
            const start = parseInt(document.getElementById('batchStart').value) || 1;
            const count = parseInt(document.getElementById('batchCount').value) || 100;
            
            const startCode = prefix + String(start).padStart(6, '0');
            const endCode = prefix + String(start + count - 1).padStart(6, '0');
            
            document.getElementById('codePreview').innerHTML = 
                `<code>${startCode}</code> ~ <code>${endCode}</code>`;
        }
        
        // 监听批量配置变化
        ['batchPrefix', 'batchStart', 'batchCount'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', updateBatchPreview);
        });
        
        // 批量生成二维码
        async function generateBatchQR(format) {
            const prefix = document.getElementById('batchPrefix').value;
            const start = parseInt(document.getElementById('batchStart').value) || 1;
            const count = parseInt(document.getElementById('batchCount').value) || 100;
            const size = parseInt(document.getElementById('batchSize').value);
            const withLabel = document.getElementById('batchLabel').checked;
            
            if (count > 10000) {
                showToast('单次生成数量不能超过10000', 'error');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            const progressEl = document.getElementById('progressBar');
            const fillEl = document.getElementById('progressFill');
            
            try {
                // 每批最多500个（避免超时）
                const BATCH_SIZE = 500;
                const batches = [];
                for (let s = start; s < start + count; s += BATCH_SIZE) {
                    const batchCount = Math.min(BATCH_SIZE, start + count - s);
                    batches.push({ start: s, count: batchCount });
                }
                
                progressEl.classList.add('show');
                
                if (batches.length === 1) {
                    // 单批次直接下载
                    await downloadBatch(prefix, batches[0].start, batches[0].count, size, withLabel, format);
                    fillEl.style.width = '100%';
                } else {
                    // 多批次：逐个下载
                    for (let i = 0; i < batches.length; i++) {
                        const b = batches[i];
                        btn.textContent = `生成中 ${i+1}/${batches.length}...`;
                        fillEl.style.width = `${((i) / batches.length) * 100}%`;
                        await downloadBatch(prefix, b.start, b.count, size, withLabel, format);
                    }
                    fillEl.style.width = '100%';
                    showToast(`✅ 已生成 ${count} 个二维码（分${batches.length}个文件下载）`);
                }
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = format === 'pdf' ? '📄 生成PDF打印版' : '📦 生成ZIP包（单独文件）';
                setTimeout(() => progressEl.classList.remove('show'), 2000);
            }
        }
        
        async function downloadBatch(prefix, start, count, size, withLabel, format) {
            const params = new URLSearchParams({
                prefix, start: start.toString(), count: count.toString()
            });
            if (format === 'zip') {
                params.append('size', size.toString());
                params.append('with_label', withLabel.toString());
            }
            
            const endpoint = format === 'pdf' ? '/api/v1/batch-qr/pdf' : '/api/v1/batch-qr';
            const response = await fetch(`${API_BASE}${endpoint}?${params}`, { method: 'POST' });
            
            if (!response.ok) {
                throw new Error(`生成失败 (${response.status})`);
            }
            
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = format === 'pdf' ? 
                `qrcodes_${prefix}_${start}_${start+count-1}.pdf` :
                `qrcodes_${prefix}_${start}_${start+count-1}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }
        
        // 上传文件
        async function uploadFile(input, callback) {
            const file = input.files[0];
            if (!file) return;
            
            // 检查文件类型
            const allowedTypes = ['image/jpeg', 'image/png', 'image/jpg', 'application/pdf'];
            if (!allowedTypes.includes(file.type)) {
                showToast('仅支持 JPG、PNG、PDF 格式', 'error');
                return;
            }
            
            // 检查文件大小（最大10MB）
            if (file.size > 10 * 1024 * 1024) {
                showToast('文件大小不能超过10MB', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    callback(data.url);
                    showToast('✅ 上传成功');
                } else {
                    throw new Error(data.detail || '上传失败');
                }
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 添加生产记录
        function addProductionRecord(data = {}) {
            const container = document.getElementById('productionRecords');
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'record-item';
            div.dataset.id = id;
            div.innerHTML = `
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">删除</button>
                <div class="form-row">
                    <div class="form-group">
                        <label>阶段名称</label>
                        <input type="text" class="prod-stage" placeholder="如：播种" value="${data.stage || ''}">
                    </div>
                    <div class="form-group">
                        <label>操作日期</label>
                        <input type="date" class="prod-date" value="${data.date || ''}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>操作人员</label>
                        <input type="text" class="prod-operator" placeholder="如：张师傅" value="${data.operator || ''}">
                    </div>
                    <div class="form-group">
                        <label>操作描述</label>
                        <input type="text" class="prod-desc" placeholder="如：春季播种，施用有机肥" value="${data.description || ''}">
                    </div>
                </div>
                <div class="form-group">
                    <label>上传图片</label>
                    <div class="file-upload" onclick="this.querySelector('input').click()">
                        <input type="file" accept="image/*" onchange="uploadProdImage(this, ${id})">
                        <p>📷 点击上传图片</p>
                    </div>
                    <div class="uploaded-files" id="prod-files-${id}"></div>
                </div>
            `;
            container.appendChild(div);
        }
        
        // 上传生产记录图片
        function uploadProdImage(input, recordId) {
            uploadFile(input, (url) => {
                const container = document.getElementById(`prod-files-${recordId}`);
                container.innerHTML = `
                    <div class="uploaded-file">
                        <a href="${API_BASE}${url}" target="_blank">${url.split('/').pop()}</a>
                        <button onclick="this.parentElement.remove()">✕</button>
                    </div>
                `;
                // 保存URL到input元素
                input.dataset.url = url;
            });
        }
        
        // 添加质检记录
        function addQualityRecord(data = {}) {
            const container = document.getElementById('qualityRecords');
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'record-item';
            div.dataset.id = id;
            div.innerHTML = `
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">删除</button>
                <div class="form-row">
                    <div class="form-group">
                        <label>检测日期</label>
                        <input type="date" class="quality-date" value="${data.check_date || ''}">
                    </div>
                    <div class="form-group">
                        <label>检测结果</label>
                        <select class="quality-result">
                            <option value="合格" ${data.result === '合格' ? 'selected' : ''}>合格</option>
                            <option value="不合格" ${data.result === '不合格' ? 'selected' : ''}>不合格</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>检测员</label>
                        <input type="text" class="quality-inspector" placeholder="如：李检测员" value="${data.inspector || ''}">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" class="quality-notes" placeholder="如：农残检测合格" value="${data.notes || ''}">
                    </div>
                </div>
                <div class="form-group">
                    <label>上传质检报告（支持PDF、图片）</label>
                    <div class="file-upload" onclick="this.querySelector('input').click()">
                        <input type="file" accept=".pdf,image/*" onchange="uploadQualityReport(this, ${id})">
                        <p>📄 点击上传质检报告</p>
                    </div>
                    <div class="uploaded-files" id="quality-files-${id}"></div>
                </div>
            `;
            container.appendChild(div);
        }
        
        // 上传质检报告
        function uploadQualityReport(input, recordId) {
            uploadFile(input, (url) => {
                const container = document.getElementById(`quality-files-${recordId}`);
                container.innerHTML = `
                    <div class="uploaded-file">
                        <a href="${API_BASE}${url}" target="_blank">📄 质检报告</a>
                        <button onclick="this.parentElement.remove(); document.querySelector('[data-id=\"${recordId}\"] input[type=file]').dataset.url=\'\'">✕</button>
                    </div>
                `;
                input.dataset.url = url;
            });
        }
        
        // 提交表单
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 收集生产记录
            const productionRecords = [];
            document.querySelectorAll('#productionRecords .record-item').forEach(item => {
                const fileInput = item.querySelector('input[type=file]');
                productionRecords.push({
                    stage: item.querySelector('.prod-stage').value,
                    date: item.querySelector('.prod-date').value,
                    operator: item.querySelector('.prod-operator').value,
                    description: item.querySelector('.prod-desc').value,
                    image_url: fileInput?.dataset?.url || null
                });
            });
            
            // 收集质检记录
            const qualityRecords = [];
            document.querySelectorAll('#qualityRecords .record-item').forEach(item => {
                const fileInput = item.querySelector('input[type=file]');
                qualityRecords.push({
                    check_date: item.querySelector('.quality-date').value,
                    result: item.querySelector('.quality-result').value,
                    inspector: item.querySelector('.quality-inspector').value,
                    notes: item.querySelector('.quality-notes').value,
                    report_url: fileInput?.dataset?.url || null
                });
            });
            
            const isBatchMode = currentMode === 'batch';
            
            if (isBatchMode) {
                // ===== 号段批量录入 =====
                const prefix = document.getElementById('batch_prefix').value.trim();
                const start = parseInt(document.getElementById('batch_start').value) || 1;
                const end = parseInt(document.getElementById('batch_end').value) || 1000;
                
                if (!prefix) { showToast('❌ 请输入编码前缀', 'error'); return; }
                
                const data = {
                    prefix, start, end,
                    name: document.getElementById('name').value,
                    category: document.getElementById('category').value,
                    brand: document.getElementById('brand').value,
                    origin: document.getElementById('origin').value,
                    description: document.getElementById('description').value,
                    image_url: document.getElementById('image_url').value,
                    farm_info: {
                        farm_name: document.getElementById('farm_name').value,
                        location: document.getElementById('farm_location').value,
                        area: parseFloat(document.getElementById('farm_area').value) || null,
                        certification: document.getElementById('farm_certification').value,
                        story: document.getElementById('farm_story').value
                    },
                    production_records: productionRecords,
                    quality_records: qualityRecords
                };
                
                try {
                    showToast(`⏳ 正在创建 ${end - start + 1} 个产品...`);
                    const response = await fetch(`${API_BASE}/api/v1/products/batch`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    if (response.ok) {
                        showToast(`✅ ${result.message}（${result.created_count}个）`);
                        resetForm();
                    } else {
                        showToast('❌ ' + (result.detail || '录入失败'), 'error');
                    }
                } catch (error) {
                    showToast('❌ 网络错误：' + error.message, 'error');
                }
            } else {
                // ===== 单个产品录入 =====
                const data = {
                    code: document.getElementById('code').value,
                    name: document.getElementById('name').value,
                    category: document.getElementById('category').value,
                    brand: document.getElementById('brand').value,
                    origin: document.getElementById('origin').value,
                    description: document.getElementById('description').value,
                    image_url: document.getElementById('image_url').value,
                    farm_info: {
                        farm_name: document.getElementById('farm_name').value,
                        location: document.getElementById('farm_location').value,
                        area: parseFloat(document.getElementById('farm_area').value) || null,
                        certification: document.getElementById('farm_certification').value,
                        story: document.getElementById('farm_story').value
                    },
                    production_records: productionRecords,
                    quality_records: qualityRecords
                };
                
                try {
                    const response = await fetch(`${API_BASE}/api/v1/products`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        showToast('✅ 产品录入成功！');
                        resetForm();
                    } else {
                        const err = await response.json();
                        showToast('❌ ' + (err.detail || '录入失败'), 'error');
                    }
                } catch (error) {
                    showToast('❌ 网络错误：' + error.message, 'error');
                }
            }
        });
        
        // 重置表单
        // 录入模式：single / batch
        let currentMode = 'single';
        
        function setInputMode(mode) {
            currentMode = mode;
            const singleBtn = document.getElementById('modeSingle');
            const batchBtn = document.getElementById('modeBatch');
            const batchArea = document.getElementById('batchInputArea');
            const singleCodeRow = document.getElementById('singleCodeRow');
            
            if (mode === 'batch') {
                singleBtn.style.background = 'white';
                singleBtn.style.color = '#333';
                singleBtn.style.borderColor = '#ddd';
                batchBtn.style.background = '#667eea';
                batchBtn.style.color = 'white';
                batchBtn.style.borderColor = '#667eea';
                batchArea.style.display = 'block';
                singleCodeRow.style.display = 'none';
            } else {
                singleBtn.style.background = '#667eea';
                singleBtn.style.color = 'white';
                singleBtn.style.borderColor = '#667eea';
                batchBtn.style.background = 'white';
                batchBtn.style.color = '#333';
                batchBtn.style.borderColor = '#ddd';
                batchArea.style.display = 'none';
                singleCodeRow.style.display = 'grid';
            }
        }
        
        // 号段数量实时计算 + 冲突检测
        ['batch_start', 'batch_end', 'batch_prefix'].forEach(id => {
            const el = document.getElementById(id);
            el?.addEventListener('input', () => {
                const s = parseInt(document.getElementById('batch_start').value) || 0;
                const e = parseInt(document.getElementById('batch_end').value) || 0;
                const total = e >= s ? (e - s + 1) : 0;
                document.getElementById('batch_total').value = total.toLocaleString();
                checkBatchConflict();
            });
        });
        
        // 加载已用号段
        loadUsedRanges();
        
        async function loadUsedRanges() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/products/used-ranges`);
                const data = await res.json();
                window._usedRanges = data.ranges;
                
                const area = document.getElementById('usedRangesArea');
                const textEl = document.getElementById('usedRangesText');
                if (Object.keys(data.ranges).length > 0) {
                    area.style.display = 'block';
                    let html = '';
                    for (const [pfx, info] of Object.entries(data.ranges)) {
                        html += `<div style="margin-bottom:4px;"><strong>${pfx}</strong>：`;
                        html += info.intervals.map(iv => 
                            `${iv.start}~${iv.end}（${iv.count}个）`
                        ).join(', ');
                        html += ` 共${info.total}个</div>`;
                    }
                    textEl.innerHTML = html;
                } else {
                    area.style.display = 'none';
                }
                checkBatchConflict();
            } catch(e) { console.error('加载已用号段失败', e); }
        }
        
        function checkBatchConflict() {
            const prefix = (document.getElementById('batch_prefix')?.value || '').trim();
            const start = parseInt(document.getElementById('batch_start')?.value) || 0;
            const end = parseInt(document.getElementById('batch_end')?.value) || 0;
            const warnEl = document.getElementById('conflictWarning');
            const textEl = document.getElementById('conflictText');
            
            if (!prefix || !start || !end || !window._usedRanges) {
                warnEl.style.display = 'none'; return;
            }
            
            const ranges = window._usedRanges[prefix];
            if (!ranges) { warnEl.style.display = 'none'; return; }
            
            let conflicts = [];
            for (const iv of ranges.intervals) {
                // 检查区间重叠: [start,end] 与 [iv.start, iv.end]
                if (!(end < iv.start || start > iv.end)) {
                    conflicts.push(`${iv.start}~${iv.end}`);
                }
            }
            
            if (conflicts.length > 0) {
                textEl.textContent = `与已用号段 ${conflicts.join('、')} 存在重叠，请调整编号范围！`;
                warnEl.style.display = 'block';
            } else {
                warnEl.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productionRecords').innerHTML = '';
            document.getElementById('qualityRecords').innerHTML = '';
            addProductionRecord();
            addQualityRecord();
        }
        
        // 加载产品列表
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/products`);
                products = await response.json();
                
                const container = document.getElementById('productListContent');
                if (products.length === 0) {
                    container.innerHTML = '<p style="color: #999; text-align: center;">暂无产品，请先录入</p>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <div class="product-item" id="item-${p.id}">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <p>编码：${p.code} | 类别：${p.category || '未分类'} | 产地：${p.origin || '未知'}</p>
                        </div>
                        <div class="product-actions">
                            <button class="btn-view" onclick="viewProduct('${p.code}')">查看</button>
                            <button class="btn-qr" onclick="generateQRFor('${p.code}')">二维码</button>
                            <button class="btn-del" onclick="deleteProduct(${p.id}, '${p.code}')">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('productListContent').innerHTML = 
                    '<p style="color: #f44336; text-align: center;">加载失败：' + error.message + '</p>';
            }
        }
        
        // 查看产品
        function viewProduct(code) {
            window.open(`https://koolboy1978-ctrl.github.io/traceability-system/?code=${code}`, '_blank');
        }
        
        // 删除产品
        async function deleteProduct(id, code) {
            if (!confirm(`确定要删除产品 ${code} 吗？\n此操作不可恢复！`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/products/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast(`✅ 已删除 ${code}`);
                    // 从列表移除
                    const el = document.getElementById(`item-${id}`);
                    if (el) el.style.opacity = '0.3';
                    setTimeout(() => { el?.remove(); }, 500);
                } else {
                    const err = await response.json();
                    showToast('❌ ' + (err.detail || '删除失败'), 'error');
                }
            } catch (error) {
                showToast('❌ 网络错误：' + error.message, 'error');
            }
        }
        
        // 加载产品到二维码选择框
        async function loadProductsForQR() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/products`);
                products = await response.json();
                
                const select = document.getElementById('qrProductSelect');
                select.innerHTML = '<option value="">-- 请选择产品 --</option>' +
                    products.map(p => `<option value="${p.code}">${p.name} (${p.code})</option>`).join('');
            } catch (error) {
                console.error('加载产品失败', error);
            }
        }
        
        // 更新单个二维码
        function updateSingleQR() {
            const select = document.getElementById('qrProductSelect').value;
            const input = document.getElementById('qrCodeInput').value;
            const code = select || input;
            
            if (!code) return;
            
            const size = parseInt(document.getElementById('qrSize').value);
            const qrUrl = `https://koolboy1978-ctrl.github.io/traceability-system/?code=${code}`;
            
            document.getElementById('qrUrl').textContent = qrUrl;
            
            // 清除旧二维码
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            
            // 生成新二维码
            currentQR = new QRCode(container, {
                text: qrUrl,
                width: size,
                height: size,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        }
        
        // 为指定产品生成二维码
        function generateQRFor(code) {
            document.querySelectorAll('.tab')[3].click();
            document.getElementById('qrCodeInput').value = code;
            updateSingleQR();
        }
        
        // 下载单个二维码
        function downloadSingleQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                showToast('请先生成二维码', 'error');
                return;
            }
            
            const link = document.createElement('a');
            link.download = `溯源二维码_${document.getElementById('qrCodeInput').value || 'product'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // 初始化
        addProductionRecord();
        addQualityRecord();
        updateBatchPreview();
    </script>
</body>
</html>
